<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>სტუდენტების ინდექსი — WBA/MSF ინტეგრაცია</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#1f2937;--muted:#64748b;--line:#dbe3ef;--accent:#1d4ed8;--accent2:#0f766e;--bad:#b91c1c;--warn:#b45309;--soft:#eef4ff;--shadow:0 10px 30px rgba(15,23,42,.08);--radius:18px}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#eef4ff 0%,#f8fbff 100%);color:var(--ink);font:16px/1.45 Calibri,Arial,sans-serif}
.wrap{max-width:1480px;margin:24px auto 80px;padding:0 16px}
.hero,.student-card,.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.hero{padding:22px 24px;margin-bottom:18px;background:linear-gradient(135deg,#ecfeff 0%,#eff6ff 100%)}
h1,h2,h3{margin:0 0 8px}h1{font-size:30px}h2{font-size:22px}h3{font-size:18px}.sub{color:var(--muted)}
.controls,.meta-grid{display:grid;gap:12px;grid-template-columns:repeat(5,minmax(150px,1fr));align-items:end;margin-top:16px}
.field{display:flex;flex-direction:column;gap:6px}label{font-weight:700}input[type="text"],input[type="date"]{border:1px solid #cfd8e3;border-radius:12px;padding:11px 12px;font:inherit;background:#fff;color:var(--ink);width:100%}
button{border:none;border-radius:12px;padding:11px 15px;font:700 15px Calibri,Arial,sans-serif;cursor:pointer;background:var(--accent);color:#fff;box-shadow:var(--shadow)}button.secondary{background:var(--accent2)}button.ghost{background:#e8eef8;color:#0f172a;box-shadow:none}button.bad{background:var(--bad)}button.warn{background:var(--warn)}
.student-card{margin-bottom:18px;overflow:hidden}.student-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;gap:12px;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;background:#fbfdff}
.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#edf2ff;color:#1e3a8a;font-size:13px;font-weight:800;margin:4px 6px 0 0}.student-name{font-size:22px;font-weight:800}.student-body{padding:18px 20px}
.template-buttons{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.template-buttons button.active{outline:3px solid rgba(29,78,216,.22)}
.score-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-top:14px}.score-box{border:1px solid var(--line);border-radius:14px;background:#f8fbff;padding:12px}.score-box .k{font-size:13px;color:var(--muted);font-weight:700}.score-box .v{font-size:24px;font-weight:800;margin-top:2px}
.panel{overflow:hidden}.panel-head{padding:14px 18px;background:#fbfdff;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}.panel-body{height:78vh;background:#fff}iframe{width:100%;height:100%;border:0;background:#fff}
.empty{padding:28px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:16px;background:#fafcff}.danger-link{background:transparent;color:var(--bad);box-shadow:none;padding:7px 8px}
@media(max-width:1100px){.controls,.meta-grid,.score-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.panel-body{height:72vh}}
@media(max-width:760px){.controls,.meta-grid,.score-grid{grid-template-columns:1fr}.wrap{padding:0 10px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>სტუდენტების ინდექსი — WBA/MSF ინტეგრირებული სამუშაო სივრცე</h1>
    <div class="sub">შექმენით ახალი სტუდენტის ბლოკი, გახსენით შესაბამისი შაბლონები და ქულები ავტომატურად გადაიტანება WBA-სა და MSF Resume-ში.</div>
    <div class="controls">
      <div class="field"><label for="newName">სტუდენტი</label><input id="newName" type="text" placeholder="სახელი და გვარი"></div>
      <div class="field"><label for="newGroup">ჯგუფი</label><input id="newGroup" type="text" placeholder="ჯგუფი"></div>
      <div class="field"><label for="newCuration">კურაცია</label><input id="newCuration" type="text" placeholder="კურაცია"></div>
      <div class="field"><label for="newStart">კურაციის დაწყება</label><input id="newStart" type="date"></div>
      <div class="field"><label for="newEnd">კურაციის დასრულება</label><input id="newEnd" type="date"></div>
      <div class="field"><button id="addStudentBtn" type="button">ახალი სტუდენტის ბლოკის შექმნა</button></div>
    </div>
  </div>
  <div id="studentsHost"></div>
  <div class="panel" id="templatePanel" style="display:none">
    <div class="panel-head"><div><h2 id="panelTitle">შაბლონი</h2><div class="sub" id="panelSub">—</div></div><button class="ghost" id="closePanelBtn" type="button">დახურვა</button></div>
    <div class="panel-body"><iframe id="templateFrame" title="template workspace"></iframe></div>
  </div>
</div>

const TEMPLATE_LABELS = { mini:'Mini-CEX', cbd:'CBD', dops:'DOPS', wba:'WBA', msf:'MSF Template', msf_resume:'MSF Resume', uceem:'UCEEM' };
const STORAGE_KEY = 'student_index_wba_msf_integrated_v6';
let state = { students: [] };
let active = { studentId:null, template:null };
function decodeTemplate(key){ const bin=atob(TEMPLATE_B64[key]); const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0)); return new TextDecoder('utf-8').decode(bytes); }
function uid(){ return 'st_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8); }
function esc(v){ return String(v ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch])); }
function fmt(v){ const n=Number(v); return Number.isFinite(n) && n>0 ? n.toFixed(2) : '—'; }
function getStudent(id){ return state.students.find(s=>s.id===id) || null; }
function ensureScores(s){ if(!s.scores) s.scores={}; return s.scores; }
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function loadState(){ const raw=localStorage.getItem(STORAGE_KEY); if(!raw) return; try{ const parsed=JSON.parse(raw); if(parsed && Array.isArray(parsed.students)) state=parsed; }catch(e){} }
function addStudent(){
  const n=document.getElementById('newName').value.trim();
  const s={ id:uid(), name:n || `სტუდენტი ${state.students.length+1}`, group:document.getElementById('newGroup').value.trim(), curation:document.getElementById('newCuration').value.trim(), start:document.getElementById('newStart').value, end:document.getElementById('newEnd').value, scores:{mini:null,cbd:null,dops:null,msfAverage:null,msfDomains:null} };
  state.students.push(s); ['newName','newGroup','newCuration','newStart','newEnd'].forEach(id=>document.getElementById(id).value=''); saveState(); renderStudents();
}
function deleteStudent(id){ if(!confirm('ნამდვილად გსურთ სტუდენტის ბლოკის წაშლა?')) return; state.students=state.students.filter(s=>s.id!==id); if(active.studentId===id) closePanel(); saveState(); renderStudents(); }
function updateStudentField(id,field,value){ const s=getStudent(id); if(!s) return; s[field]=value; saveState(); renderStudentHeader(id); pushToOpenFrame(); }
function renderStudentHeader(id){ const s=getStudent(id); const el=document.querySelector(`[data-title-for="${id}"]`); if(!s||!el) return; el.innerHTML=`${esc(s.name)} <span class="badge">${esc(s.group||'ჯგუფი —')}</span><span class="badge">${esc(s.curation||'კურაცია —')}</span>`; }
function scoreBoxes(s){ const sc=ensureScores(s); const domains=sc.msfDomains || {}; return `<div class="score-grid"><div class="score-box"><div class="k">Mini-CEX საშუალო</div><div class="v">${fmt(sc.mini)}</div></div><div class="score-box"><div class="k">CBD საშუალო</div><div class="v">${fmt(sc.cbd)}</div></div><div class="score-box"><div class="k">DOPS საშუალო</div><div class="v">${fmt(sc.dops)}</div></div><div class="score-box"><div class="k">MSF საშუალო</div><div class="v">${fmt(sc.msfAverage)}</div></div><div class="score-box"><div class="k">MSF დომენები</div><div class="v" style="font-size:14px;line-height:1.35">${Object.keys(domains).length ? 'გადატანილია' : '—'}</div></div></div>`; }
function renderStudents(){
  const host=document.getElementById('studentsHost');
  if(!state.students.length){ host.innerHTML='<div class="empty">სტუდენტის ბლოკი ჯერ არ არის შექმნილი.</div>'; return; }
  host.innerHTML=state.students.map(s=>`<div class="student-card" id="card_${s.id}"><div class="student-head"><div><div class="student-name" data-title-for="${s.id}">${esc(s.name)} <span class="badge">${esc(s.group||'ჯგუფი —')}</span><span class="badge">${esc(s.curation||'კურაცია —')}</span></div><div class="sub">ყველა შაბლონი მუშაობს ამ სტუდენტის ბლოკში.</div></div><button class="danger-link" type="button" onclick="deleteStudent('${s.id}')">წაშლა</button></div><div class="student-body"><div class="meta-grid"><div class="field"><label>სტუდენტი</label><input type="text" value="${esc(s.name)}" oninput="updateStudentField('${s.id}','name',this.value)"></div><div class="field"><label>ჯგუფი</label><input type="text" value="${esc(s.group||'')}" oninput="updateStudentField('${s.id}','group',this.value)"></div><div class="field"><label>კურაცია</label><input type="text" value="${esc(s.curation||'')}" oninput="updateStudentField('${s.id}','curation',this.value)"></div><div class="field"><label>კურაციის დაწყება</label><input type="date" value="${esc(s.start||'')}" onchange="updateStudentField('${s.id}','start',this.value)"></div><div class="field"><label>კურაციის დასრულება</label><input type="date" value="${esc(s.end||'')}" onchange="updateStudentField('${s.id}','end',this.value)"></div></div><div class="template-buttons">${['mini','cbd','dops','wba','msf','msf_resume','uceem'].map(t=>`<button type="button" class="${active.studentId===s.id && active.template===t ? 'active' : ''}" onclick="openTemplate('${s.id}','${t}')">${TEMPLATE_LABELS[t]}</button>`).join('')}</div><div id="scores_${s.id}">${scoreBoxes(s)}</div></div></div>`).join('');
}
function refreshScoreBox(id){ const s=getStudent(id); const el=document.getElementById('scores_'+id); if(s&&el) el.innerHTML=scoreBoxes(s); }

`function setVal(id,val){const el=document.getElementById(id); if(el && val!==undefined && val!==null){el.value=val; el.dispatchEvent(new Event('input',{bubbles:true})); el.dispatchEvent(new Event('change',{bubbles:true}));}}\n`+
`function numText(id){const el=document.getElementById(id); if(!el)return null; const n=parseFloat(String(el.textContent||el.value||'').replace(',','.')); return Number.isFinite(n)?n:null;}\n`+

function injectBridge(html, studentId, templateType){ const script=bridgeScript(studentId, templateType); if(/<\/body>/i.test(html)) return html.replace(/<\/body>/i, script + '</body>'); return html + script; }
function openTemplate(studentId, templateType){
  const s=getStudent(studentId); if(!s) return; active={studentId, template:templateType};
  const panel=document.getElementById('templatePanel'); document.getElementById('panelTitle').textContent=TEMPLATE_LABELS[templateType] + ' — ' + s.name; document.getElementById('panelSub').textContent=[s.group,s.curation,s.start,s.end].filter(Boolean).join(' | ') || 'მეტამონაცემები არ არის სრულად შევსებული'; panel.style.display='block';
  document.getElementById('templateFrame').srcdoc=injectBridge(decodeTemplate(templateType), studentId, templateType); renderStudents(); setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'start'}),0);
}
function closePanel(){ active={studentId:null, template:null}; document.getElementById('templatePanel').style.display='none'; document.getElementById('templateFrame').srcdoc=''; renderStudents(); }
function pushToOpenFrame(){ const f=document.getElementById('templateFrame'); try{ if(f && f.contentWindow && typeof f.contentWindow.__INDEX_BRIDGE_APPLY__==='function') f.contentWindow.__INDEX_BRIDGE_APPLY__(); }catch(e){} }
function updateFromTemplate(studentId, templateType, data){ const s=getStudent(studentId); if(!s) return; const sc=ensureScores(s); if(['mini','cbd','dops'].includes(templateType)){ const n=Number(data && data.average); if(Number.isFinite(n) && n>0) sc[templateType]=n; } if(templateType==='msf'){ const n=Number(data && data.average); if(Number.isFinite(n) && n>0) sc.msfAverage=n; if(data && data.domains && Object.keys(data.domains).length) sc.msfDomains=data.domains; } saveState(); refreshScoreBox(studentId); if(active.studentId===studentId && (active.template==='wba' || active.template==='msf_resume')) pushToOpenFrame(); }
