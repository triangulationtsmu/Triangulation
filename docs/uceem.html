<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCEEM — ანონიმური შეფასება</title>
  <link rel="stylesheet" href="./css/app.css" />
  <style>
    .uceem-scale{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin-top:10px}
    .uceem-choice{border:1px solid #d1d9e6;border-radius:12px;padding:10px 6px;text-align:center;background:#fcfdff;cursor:pointer}
    .uceem-choice input{transform:scale(1.15)}
    .uceem-choice strong{display:block;font-size:16px}
    .uceem-choice span{font-size:12px;color:var(--muted)}
    .uceem-item{border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:12px;background:#fff}
    .uceem-code{display:inline-block;font-weight:800;background:#edf2ff;color:#0f172a;padding:4px 10px;border-radius:10px;margin-bottom:6px}
    .target-card{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff;display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
  </style>
</head>
<body>
  <div class="wrap" style="max-width:1040px;padding-top:20px;padding-bottom:60px">
    <div class="card">
      <div class="head">
        <h1>UCEEM — ანონიმური შეფასება</h1>
        <div class="muted">კითხვარი <strong>სრულიად ანონიმურია</strong>. არ გეკითხებათ სახელი, გვარი, ტელეფონი ან სხვა მაიდენტიფიცირებელი ინფორმაცია. შედეგები გამოიყენება სასწავლო გარემოს გაუმჯობესებისთვის.</div>
      </div>
      <div class="body" id="uceem-root">
        <div class="loading-overlay"><span class="spinner"></span> იტვირთება…</div>
      </div>
    </div>
  </div>
  <div id="toast"></div>
  <script type="module" src="./js/uceem-public.js"></script>
</body>
</html>
